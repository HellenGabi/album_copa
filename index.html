<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Gerencie sua coleção de figurinhas da Copa 2026 na nuvem. Acompanhe seu progresso, marque figurinhas que tem, repetidas e faltantes. Sincronize em múltiplos dispositivos.">
    <meta name="keywords" content="Copa 2026, figurinhas, álbum, panini, coleção, figurinha, gerenciador">
    <meta name="author" content="Kevin Veriato">
    <meta name="theme-color" content="#004d98">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Álbum Copa 2026 - Gerencie sua coleção na nuvem">
    <meta property="og:description"
        content="Aplicativo para gerenciar sua coleção de figurinhas da Copa 2026. Sincronize com Firebase, gere relatórios em PDF e acompanhe seu progresso em tempo real.">
    <meta property="og:url" content="https://kevinnnnnnnns.github.io/Copa_Album/">
    <meta property="og:site_name" content="Álbum Copa 2026">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Álbum Copa 2026">
    <meta name="twitter:description" content="Gerencie sua coleção de figurinhas da Copa 2026">
    <link rel="canonical" href="https://kevinnnnnnnns.github.io/Copa_Album/">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-family='Outfit'>⚽</text></svg>">
    <title>Álbum Copa 2026 - Gerencie sua coleção na nuvem</title>
    <link rel="stylesheet" href="css/style.css?v=14.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Álbum Copa 2026",
        "description": "Aplicativo web para gerenciar sua coleção de figurinhas da Copa 2026",
        "applicationCategory": "Productivity",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "BRL"
        },
        "author": {
            "@type": "Person",
            "name": "Gabriela Maciel Lopes de Amorim e Hellen Gabriela Scarantti"
        }
    }
    </script>
</head>

<body>
    <header>
        <div class="container header-content">
            <div class="title-area">
                <h1>Álbum Copa <span>2026</span></h1>
                <p>Gerencie sua coleção na nuvem!</p>
            </div>

            <div class="user-area">
                <button id="auth-btn" class="btn-auth" hidden>Entrar / Criar Conta</button>
                <div id="user-profile" class="user-profile hidden">
                    <span id="user-email"></span>
                    <button id="logout-btn" class="btn-logout">Sair</button>
                </div>

                <div class="stats-card">
                    <div class="stats-text"
                        style="display: flex; justify-content: space-between; font-weight: 800; margin-bottom: 5px;">
                        <span>Progresso</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-container">
                        <div id="main-progress-bar" class="progress-bar"></div>
                    </div>
                    <div class="stats-text"
                        style="margin-top: 10px; font-size: 0.9rem; font-weight: 600; display: flex; justify-content: space-between;">
                        <span id="stats-total">Tenho: 0 / 0</span>
                        <span id="stats-repeated">Repetidas: 0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login">Entrar</button>
                <button class="tab-btn" id="tab-register">Cadastrar</button>
            </div>

            <form id="auth-form" class="auth-form">
                <input type="email" id="auth-email" placeholder="Seu E-mail" required>
                <input type="password" id="auth-password" placeholder="Sua Senha" required>
                <button type="submit" id="submit-auth" class="btn-submit">Confirmar</button>
            </form>
            <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <main class="container">
        <section class="controls">
            <div class="filters">
                <button class="btn-filter active" data-filter="all">Todas</button>
                <button class="btn-filter" data-filter="missing">Faltantes</button>
                <button class="btn-filter" data-filter="have">Tenho</button>
                <button class="btn-filter" data-filter="repeated">Repetidas</button>
                <button id="generate-report-btn" class="btn-filter btn-report">Relatório</button>
                <button id="multi-select-btn" class="btn-filter btn-multi-select">➕ Multi-Seleção</button>
            </div>

            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar por jogador ou número...">
            </div>
        </section>

        <div id="sticker-grid" class="sticker-grid">
            <!-- Stickers will be injected here by JS -->
        </div>
    </main>

    <!-- Report Options Modal -->
    <div id="report-modal" class="modal hidden">
        <div class="modal-content report-options">
            <span class="close-modal" id="close-report-modal">&times;</span>
            <h2>Gerar Relatório</h2>

            <div class="report-tabs">
                <button class="report-tab-btn active" data-report-type="complete">Completo</button>
                <button class="report-tab-btn" data-report-type="missing">Faltantes</button>
            </div>

            <p>Escolha o formato desejado para o seu relatório:</p>
            <div class="report-btns">
                <button id="gen-pdf-btn" class="btn-report-opt pdf">
                    <span class="icon">📄</span>
                    <div class="text">
                        <strong>PDF Premium</strong>
                        <span>Visual elegante e colorido</span>
                    </div>
                </button>
                <button id="gen-txt-btn" class="btn-report-opt txt">
                    <span class="icon">📝</span>
                    <div class="text">
                        <strong>Arquivo TXT</strong>
                        <span>Simples e leve</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden Report Template for PDF -->
    <div id="report-template" style="display: none;">
        <!-- Content will be injected by JS -->
    </div>

    <!-- Multi-Selection Modal -->
    <div id="multi-select-modal" class="modal hidden">
        <div class="modal-content multi-select-content">
            <span class="close-modal" id="close-multi-select">&times;</span>
            <h2>Adicionar Figurinhas em Lote</h2>

            <div class="multi-select-controls">
                <select id="multi-select-team" class="multi-select-input">
                    <option value="">Selecione uma seleção...</option>
                </select>

                <div class="multi-select-actions">
                    <button id="select-all-btn" class="btn-multi-action">Selecionar Tudo</button>
                    <button id="deselect-all-btn" class="btn-multi-action">Deselecionar Tudo</button>
                </div>
            </div>

            <div id="multi-select-grid" class="multi-select-grid">
                <!-- Stickers will be injected here -->
            </div>

            <div class="multi-select-footer">
                <span id="multi-select-count">0 selecionadas</span>
                <div>
                    <button id="mark-as-have-btn" class="btn-action-bulk btn-have">Marcar como Tenho</button>
                    <button id="mark-as-repeated-btn" class="btn-action-bulk btn-repeated">Marcar como
                        Repetidas</button>
                    <button id="close-multi-select-btn" class="btn-action-bulk btn-cancel">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase App -->
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- PDF -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Dados -->
    <script defer src="./src/data/squads.js"></script>

    <!-- Seus scripts -->
    <script defer src="./src/js/firebase.js"></script>
    <script defer src="./src/js/app.js"></script>
    <script defer src="./src/js/data.js"></script>
    <script defer src="./src/js/storage.js"></script>
    <script defer src="./src/js/auth.js"></script>
    <script defer src="./src/js/render.js"></script>
    <script defer src="./src/js/reports.js"></script>
    <script defer src="./src/js/multiselect.js"></script>
    <script defer src="./src/js/events.js"></script>

</body>

</html>
